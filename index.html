    <title>CSG | Full Stack Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: '#00eeff',
              darkBg: '#0a0a0a',
              lightBg: '#f8fafc',
            }
          }
        }
      }

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .dark .dark-glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); }
        .light .dark-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .text-gradient { 
          background: linear-gradient(to right, #00eeff, #3b82f6); 
          -webkit-background-clip: text; 
          -webkit-text-fill-color: transparent; 
        }
        .bg-gradient-accent {
          background: linear-gradient(135deg, #00eeff 0%, #3b82f6 100%);
        }
        .btn-shadow { box-shadow: 0 0 20px rgba(0, 238, 255, 0.3); }
        .btn-shadow:hover { box-shadow: 0 0 30px rgba(0, 238, 255, 0.5); }
    </style>
